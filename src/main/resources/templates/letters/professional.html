<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
  <meta charset="UTF-8"/>
  <style>
    @page :first {
      size: A4;
      margin: 0 0 28mm 0;
      @bottom-center { content: element(footer); }
      @top-left { content: element(pageFrame); }
    }
    @page {
      size: A4;
      margin: 15mm 0 28mm 0;
      @bottom-center { content: element(footer); }
      @top-left { content: element(pageFrame); }
    }
    body {
      font-family: Arial, sans-serif;
      font-size: 11pt;
      line-height: 1.4;
      color: #000;
      padding: 30mm 15mm 0 15mm;
      margin: 0;
    }
    .first-page-spacer { height: 65mm; width: 100%; display: block; }
    .page-frame {
      position: running(pageFrame);
      margin-top: 7mm;
      margin-left: 7mm;
      width: 196mm;
      height: 283mm;
      box-sizing: border-box;
      border: 5px solid #D8B161;
    }
    .address-box {
      position: absolute;
      top: 55mm;
      left: 15mm;
      width: 85mm;
      height: 45mm;
      font-size: 9pt;
      line-height: 1.2;
    }
    .sender-line {
      font-size: 7pt;
      font-weight: bold;
      text-decoration: underline;
      display: block;
      margin-bottom: 2mm;
      color: #AC7B3C;
    }
    .recipient-address { font-size: 9pt; }
    .sender-box-right {
      position: absolute;
      top: 55mm;
      right: 15mm;
      font-size: 9pt;
      text-align: right;
      line-height: 1.2;
    }
    .content { position: relative; }
    .date-line { float: right; text-align: right; margin-bottom: 7px; }
    .message-title { float: left; font-weight: bold; font-size: 13pt; }
    .content-header { width: 100%; overflow: hidden; margin-bottom: 5mm; }
    .decor-img { position: absolute; top: 7mm; left: 125mm; width: 70mm; height: 40mm; }
    .message-content { white-space: pre-wrap; }
    .footer { position: running(footer); width: 100%; }
    .footer-business-details {
      text-align: center; font-size: 6pt; padding-top: 1mm;
      border-top: 4px solid #D8B161; width: 85%; margin: 0 auto 1mm auto;
    }
    .footer-business-details span + span::before { content: " • "; color: #555; font-weight: bold; margin: 0 2px; }
    .footer-bank-details {
      text-align: center; font-size: 6pt; padding-top: 1mm;
      border-top: 2px solid #D8B161; width: 65%; margin: 0 auto 3mm;
    }
    .footer-bank-details span + span::before { content: " ° "; color: #555; font-weight: bold; margin: 0 2px; }
  </style>
</head>
<body>

<div th:if="${logoImage}" style="position: absolute; top: 10mm; left: 0; right: 0; text-align: center;">
  <img th:src="${logoImage}" alt="Logo" style="max-height: 20mm; max-width: 60mm;" />
</div>

<div class="footer">
  <th:block th:if="${!#strings.isEmpty(sender.registerCourt) or !#strings.isEmpty(sender.registerNumber) or !#strings.isEmpty(sender.managingDirector) or !#strings.isEmpty(sender.taxNumber) or !#strings.isEmpty(sender.vatId)}">
    <div class="footer-business-details">
      <span th:if="${!#strings.isEmpty(sender.street)}" th:text="${(sender.street ?: '') + ' ' + (sender.streetNumber ?: '') + ', ' + (sender.postalCode ?: '') + ' ' + (sender.city ?: '')}"></span>
      <span th:if="${!#strings.isEmpty(sender.registerCourt)}" th:text="${sender.registerCourt}"></span>
      <span th:if="${!#strings.isEmpty(sender.registerNumber)}" th:text="${sender.registerNumber}"></span>
      <span th:if="${!#strings.isEmpty(sender.managingDirector)}" th:text="|GF: ${sender.managingDirector}|"></span>
      <span th:if="${!#strings.isEmpty(sender.taxNumber)}" th:text="|Steuernr.: ${sender.taxNumber}|"></span>
      <span th:if="${!#strings.isEmpty(sender.vatId)}" th:text="|USt-IdNr: ${sender.vatId}|"></span>
    </div>
  </th:block>
  <th:block th:if="${!#strings.isEmpty(sender.bankName) or !#strings.isEmpty(sender.iban) or !#strings.isEmpty(sender.bic)}">
    <div class="footer-bank-details">
      <span th:if="${!#strings.isEmpty(sender.bankName)}" th:text="|Bankverbindung: ${sender.bankName}|"></span>
      <span th:if="${!#strings.isEmpty(sender.iban)}" th:text="|IBAN: ${sender.iban}|"></span>
      <span th:if="${!#strings.isEmpty(sender.bic)}" th:text="|BIC: ${sender.bic}|"></span>
    </div>
  </th:block>
</div>

<div class="page-frame"></div>

<th:block th:if="${!#strings.isEmpty(decorImage)}">
  <img th:src="${decorImage}" alt="" class="decor-img"/>
</th:block>

<div class="address-box">
  <span class="sender-line"
        th:text="${(sender.type == 'ORGANIZATION' ? (sender.companyName ?: '') : ((sender.firstName ?: '') + ' ' + (sender.lastName ?: ''))) + ' • ' + (sender.street ?: '') + ' ' + (sender.streetNumber ?: '') + ' • ' + (sender.postalCode ?: '') + ' ' + (sender.city ?: '')}">
  </span>
  <div class="recipient-address">
    <th:block th:if="${!#strings.isEmpty(recipient.companyName)}">
      <span style="font-weight:bold;" th:text="${recipient.companyName}"></span><br/>
    </th:block>
    <th:block th:if="${!#strings.isEmpty(recipient.contactPerson)}">
      <span th:text="${(!#strings.isEmpty(recipient.salutation) ? recipient.salutation + ' ' : '') + recipient.contactPerson}"></span><br/>
    </th:block>
    <th:block th:if="${!#strings.isEmpty(recipient.firstName) or !#strings.isEmpty(recipient.lastName)}">
      <span th:text="${(!#strings.isEmpty(recipient.salutation) ? recipient.salutation + ' ' : '') + (recipient.firstName ?: '') + ' ' + (recipient.lastName ?: '')}"></span><br/>
    </th:block>
    <th:block th:if="${!#strings.isEmpty(recipient.street)}">
      <span th:text="${recipient.street + ' ' + (recipient.streetNumber ?: '')}"></span><br/>
    </th:block>
    <th:block th:if="${!#strings.isEmpty(recipient.postalCode)}">
      <span th:text="${(recipient.postalCode ?: '') + ' ' + (recipient.city ?: '')}"></span><br/>
    </th:block>
    <th:block th:if="${!#strings.isEmpty(recipient.country)}">
      <span th:text="${recipient.country}"></span>
    </th:block>
  </div>
</div>

<div class="sender-box-right">
  <strong th:text="${sender.type == 'ORGANIZATION' ? (sender.companyName ?: '') : ((sender.firstName ?: '') + ' ' + (sender.lastName ?: ''))}"></strong><br/>
  <span th:if="${!#strings.isEmpty(sender.street)}" th:text="${sender.street + ' ' + (sender.streetNumber ?: '')}"></span><br th:if="${!#strings.isEmpty(sender.street)}"/>
  <span th:if="${!#strings.isEmpty(sender.postalCode)}" th:text="${(sender.postalCode ?: '') + ' ' + (sender.city ?: '')}"></span><br th:if="${!#strings.isEmpty(sender.postalCode)}"/>
  <th:block th:if="${!#strings.isEmpty(sender.phone)}">Tel: <span th:text="${sender.phone}"></span><br/></th:block>
  <th:block th:if="${!#strings.isEmpty(sender.fax)}">Fax: <span th:text="${sender.fax}"></span><br/></th:block>
  <th:block th:if="${!#strings.isEmpty(sender.email)}">E-Mail: <span th:text="${sender.email}"></span><br/></th:block>
  <th:block th:if="${!#strings.isEmpty(sender.website)}">Web: <span th:text="${sender.website}"></span><br/></th:block>
  <th:block th:if="${!#strings.isEmpty(sender.contactPerson)}"><strong th:text="${(!#strings.isEmpty(sender.salutation) ? sender.salutation + ' ' : '') + sender.contactPerson}"></strong><br/></th:block>
</div>

<div class="content">
  <div class="first-page-spacer"></div>
  <div class="content-header">
    <div class="date-line" th:text="${date}"></div>
    <div class="message-title" th:text="${title}"></div>
  </div>
  <div class="message-content" th:text="${body}"></div>
</div>

</body>
</html>
