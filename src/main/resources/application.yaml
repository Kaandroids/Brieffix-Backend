spring:
  application:
    name: briefix

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/briefix}
    username: ${SPRING_DATASOURCE_USERNAME:briefix}
    password: ${SPRING_DATASOURCE_PASSWORD:briefix}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtpout.secureserver.net}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:no-reply@brief-fix.de}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  thymeleaf:
    check-template-location: true
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML

app:
  rate-limit:
    login:
      max-requests: 10     # max login attempts per IP per window
      window-seconds: 60   # rolling window duration in seconds
    register:
      max-requests: 5      # max registration attempts per IP per window
      window-seconds: 60

  frontend-url: ${FRONTEND_URL:http://localhost:4200}

  mail:
    from: ${MAIL_FROM:no-reply@brief-fix.de}
    verification-token-expiry-hours: 24

  jwt:
    secret: ${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}       # 15 minutes
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days
